# cargo-deny configuration (v2 format, cargo-deny >= 0.16)
# https://embarkstudios.github.io/cargo-deny/

[advisories]
unmaintained = "all"
yanked = "deny"
ignore = [
    # Transitive deps with no safe upgrade available — revisit when upstream updates.
    "RUSTSEC-2025-0134",  # rustls-pemfile unmaintained (via axum-server → tls feature; no safe upgrade)
]

[licenses]
allow = [
    "Apache-2.0",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "Unlicense",
    "MPL-2.0",
    "CDLA-Permissive-2.0",   # webpki-roots (rustls)
]

[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"
wildcards = "allow"
skip-tree = [
    { crate = "windows-targets" },
]

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
