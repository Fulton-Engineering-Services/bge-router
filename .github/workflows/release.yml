name: Release

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  REGISTRY: ghcr.io

jobs:
  # ── Quality gate ──────────────────────────────────────────────────────
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2
      - uses: taiki-e/install-action@554bdce7edf79d43854a6b7c1e392e7da7eb97a9  # cargo-nextest

      - name: Run tests
        run: cargo nextest run --no-tests=warn

  deny:
    name: Supply Chain Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: EmbarkStudios/cargo-deny-action@91bf2b620e09e18d6eb78b92e7861937469acedb  # v2

  docs:
    name: Rustdoc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2
      - name: Check docs
        run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps --document-private-items

  license-headers:
    name: License Headers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Install hawkeye
        run: |
          VERSION="6.5.1"
          ARCH="x86_64-unknown-linux-musl"
          BASE="https://github.com/korandoru/hawkeye/releases/download/v${VERSION}"
          curl --proto '=https' --tlsv1.2 -sSfL "${BASE}/hawkeye-${ARCH}.tar.xz" -o /tmp/hawkeye.tar.xz
          echo "9a6454f7f4f587764b4cbcbb865026526bbadeda477f1ef0b65924af777fb172  /tmp/hawkeye.tar.xz" | sha256sum -c
          tar -xJf /tmp/hawkeye.tar.xz -C /tmp
          sudo mv "/tmp/hawkeye-${ARCH}/hawkeye" /usr/local/bin/hawkeye
          hawkeye --version
      - name: Check license headers
        run: hawkeye check

  # ── Version check (shared by build + release) ──────────────────────────
  version:
    name: Check version
    needs: [check, test, deny, license-headers, docs]
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      repo: ${{ steps.version.outputs.repo }}
      exists: ${{ steps.tag-check.outputs.exists }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Read version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "repo=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: tag-check
        run: |
          if git rev-parse "refs/tags/v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  # ── Docker build (native runners, parallel) ──────────────────────────
  build:
    name: Build (${{ matrix.platform }})
    needs: [version]
    if: needs.version.outputs.exists == 'false'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: true
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ needs.version.outputs.repo }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,scope=${{ matrix.platform }},mode=max
          labels: |
            org.opencontainers.image.title=bge-router
            org.opencontainers.image.description=Transparent HTTP reverse proxy routing between BGE-M3 GPU and CPU upstream pools
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.url=https://github.com/Fulton-Engineering-Services/bge-router
            org.opencontainers.image.version=${{ needs.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=Apache-2.0

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: digests-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # ── Docker build TLS variant (native runners, parallel) ──────────────────
  build-tls:
    name: Build TLS (${{ matrix.platform }})
    needs: [version]
    if: needs.version.outputs.exists == 'false'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: true
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          file: Dockerfile.tls
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ needs.version.outputs.repo }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.platform }}-tls
          cache-to: type=gha,scope=${{ matrix.platform }}-tls,mode=max
          labels: |
            org.opencontainers.image.title=bge-router
            org.opencontainers.image.description=Transparent HTTP reverse proxy routing between BGE-M3 GPU and CPU upstream pools (TLS support)
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.url=https://github.com/Fulton-Engineering-Services/bge-router
            org.opencontainers.image.version=${{ needs.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=Apache-2.0

      - name: Export digest
        run: |
          mkdir -p /tmp/digests-tls
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests-tls/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: tls-digests-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests-tls/*
          if-no-files-found: error
          retention-days: 1

  # ── Merge TLS multi-arch manifest + push tags ──────────────────────────
  release-tls:
    name: Release TLS
    needs: [version, build-tls]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write   # required for cosign OIDC keyless signing
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: /tmp/digests-tls
          pattern: tls-digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest and push TLS tags
        working-directory: /tmp/digests-tls
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ needs.version.outputs.repo }}"
          VERSION="${{ needs.version.outputs.version }}"
          docker buildx imagetools create \
            -t "$IMAGE:$VERSION-tls" \
            -t "$IMAGE:latest-tls" \
            $(printf "$IMAGE@sha256:%s " *)

      # ── Image signing + SBOM ──────────────────────────────────────────
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Sign container image
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ needs.version.outputs.repo }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          DIGEST=$(docker buildx imagetools inspect "$IMAGE:$VERSION-tls" --format '{{.Manifest.Digest}}')
          cosign sign --yes "$IMAGE@$DIGEST"

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
        with:
          image: ${{ env.REGISTRY }}/${{ needs.version.outputs.repo }}:${{ needs.version.outputs.version }}-tls
          artifact-name: sbom-${{ needs.version.outputs.version }}-tls.spdx.json
          output-file: /tmp/sbom-${{ needs.version.outputs.version }}-tls.spdx.json

  # ── Merge multi-arch manifest + tag + release ──────────────────────────
  release:
    name: Release
    needs: [version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write   # required for cosign OIDC keyless signing
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest and push tags
        working-directory: /tmp/digests
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ needs.version.outputs.repo }}"
          VERSION="${{ needs.version.outputs.version }}"
          docker buildx imagetools create \
            -t "$IMAGE:$VERSION" \
            -t "$IMAGE:latest" \
            $(printf "$IMAGE@sha256:%s " *)

      # ── Image signing + SBOM ──────────────────────────────────────────
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Sign container image
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ needs.version.outputs.repo }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          DIGEST=$(docker buildx imagetools inspect "$IMAGE:$VERSION" --format '{{.Manifest.Digest}}')
          cosign sign --yes "$IMAGE@$DIGEST"

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
        with:
          image: ${{ env.REGISTRY }}/${{ needs.version.outputs.repo }}:${{ needs.version.outputs.version }}
          artifact-name: sbom-${{ needs.version.outputs.version }}.spdx.json
          output-file: /tmp/sbom-${{ needs.version.outputs.version }}.spdx.json

      # ── Git tag + GitHub Release ──────────────────────────────────────
      - name: Create git tag
        run: |
          git tag "${{ needs.version.outputs.tag }}"
          git push origin "${{ needs.version.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: Release ${{ needs.version.outputs.tag }}
          generate_release_notes: true
          make_latest: true
          files: /tmp/sbom-${{ needs.version.outputs.version }}.spdx.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
